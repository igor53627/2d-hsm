name: nix-hsm

permissions:
  contents: read

on:
  push:
    branches: [main, 'feat/**']
    paths:
      - 'impl/nix/vm-hsm/**'
      - 'impl/scripts/aya-sev-snp/**'
      - 'impl/rust/enclave-protocol/**'
      - 'impl/rust/pq-seal-v1/**'
      - 'impl/rust/pq-seal-manifest/**'
      - 'impl/rust/snp-derive-root/**'
      - 'impl/rust/snp-attest-verify/**'
      - 'impl/elixir-shim/**'
      - '.github/workflows/nix-hsm.yml'
  pull_request:
    paths:
      - 'impl/nix/vm-hsm/**'
      - 'impl/scripts/aya-sev-snp/**'
      - 'impl/rust/enclave-protocol/**'
      - 'impl/rust/pq-seal-v1/**'
      - 'impl/rust/pq-seal-manifest/**'
      - 'impl/rust/snp-derive-root/**'
      - 'impl/rust/snp-attest-verify/**'
      - 'impl/elixir-shim/**'
      - '.github/workflows/nix-hsm.yml'

jobs:
  rust-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: impl/rust/enclave-protocol
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Default unit tests
        run: cargo test

      - name: ARM / PQ path (reference-test-key)
        run: cargo test --features reference-test-key

      - name: Mock UDS profile (test-support, demo-mock-sign)
        run: cargo test --features test-support,demo-mock-sign

      - name: Reference SNP verifier (snp-verify, TASK-1 AC#3/#12)
        run: cargo test --features snp-verify

      - name: Agent Gateway secp256k1 (agent-gateway, TASK-7.6) — PROVE_IDENTITY gated off
        run: cargo test --features agent-gateway

      # TASK-7.7 5b-2b-ii: compile + RUN the Linux-only vsock boot-relay leaf. The device-needing channel
      # acceptance tests are #[ignore] (they run only on aya / a real vsock env), so this runner executes
      # the deviceless logic — the `cancellable_boundary` poll primitive (UnixStream::pair) and the
      # in-memory relay framing/forward cores — while still COMPILING the #[ignore] vsock tests so the leaf
      # can't bit-rot. This runs on ubuntu-latest (Linux). NOT `staging-vsock,agent-gateway` (that pulls
      # ml-dsa-65 and trips the `ml-dsa-65 ⊕ agent-gateway` role-isolation compile_error).
      # INVARIANT: any test under `vsock-transport` that needs a live vsock DEVICE (connect/bind) MUST be
      # `#[ignore]` (runs on aya only) — this runner has no vsock device, so a non-ignored device test fails.
      - name: Agent Gateway vsock boot-relay leaf (compile + run deviceless; #[ignore] aya skipped)
        run: cargo test --features vsock-transport,agent-gateway

      # TASK-7.7 (d-ii)/4c: builds the lab-only smoke bin via required-features and runs (i) the
      # CARGO_BIN_EXE integration arms (dispatch-first + PROTOCOL-ONLY stdout, byte-exact ERR frames;
      # deterministic deviceless — see the test header) and (ii) the quote_smoke deadline-window unit
      # (pins the < ~2s kernel-connect-timer constraint as a CI fact). Additive: the pinned leaf step
      # above stays byte-identical; this avoids re-running the whole suite under unified features.
      - name: (4c) quote-smoke bin contract — dispatch-first + PROTOCOL-ONLY stdout (lab-quote-smoke)
        run: |
          cargo test --features vsock-transport,agent-gateway,lab-quote-smoke --test twod_hsm_quote_smoke_bin
          cargo test --features vsock-transport,agent-gateway,lab-quote-smoke --lib quote_smoke

      - name: Agent Gateway incl. PROVE_IDENTITY preview (TASK-7.6.3)
        run: cargo test --features agent-prove-identity-preview

      - name: Agent Gateway incl. GENERATE_KEYS exec preview (TASK-7.6.x)
        run: cargo test --features agent-keygen-exec-preview

      - name: ML-DSA-65 perf bench compiles (TASK-1 AC#7)
        run: cargo build --example bench_mldsa65 --features ml-dsa-65,pq-seal-provisioning

      # Shared multi-host manifest format + per-host blob selection (TASK-1.1). Tiny lib used by
      # the `pq-seal-v1 manifest` ceremony and (next slice) the boot-time selector.
      - name: pq-seal-manifest builds + tests
        working-directory: impl/rust/pq-seal-manifest
        run: cargo test

      # Offline provisioning tool: not a workspace member, so it only gets
      # rebuilt here. Catches enclave-protocol API drift (e.g. seal/verify
      # signature changes) before it rots the tool. `cargo test` also covers
      # the `manifest build` subcommand (seal-per-host + trustless selection).
      - name: pq-seal-v1 provisioning tool builds + tests
        working-directory: impl/rust/pq-seal-v1
        run: cargo test

      # TASK-1.1: SNP firmware-derived pq-seal root boot helper. Separate crate
      # (owns the one ioctl enclave-protocol's forbid-unsafe can't). The ioctl
      # path is Linux-gated, so the off-SNP tests here cover the repr(C) ABI
      # sizes, the IOWR number, the domain-separated derivation, and the
      # graceful no-device error; the in-guest path is validated on aya.
      - name: snp-derive-root boot helper builds + tests
        working-directory: impl/rust/snp-derive-root
        run: cargo test

      # TASK-1 DoD #3: relying-party attestation verifier. Separate crate (ECDSA-P384 + RSA-PSS +
      # X.509, deliberately off the forbid-unsafe enclave path). Tests cover the report sig, the
      # cert chain against real AMD Genoa ARK/ASK (RSA-PSS) + a synthetic ECDSA chain end to end.
      - name: snp-attest-verify reference verifier builds + tests
        working-directory: impl/rust/snp-attest-verify
        run: cargo test

  elixir-test:
    runs-on: ubuntu-latest
    needs: rust-test
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - uses: dtolnay/rust-toolchain@stable

      - name: Elixir shim integration tests
        run: |
          cd impl/elixir-shim
          mix deps.get
          cd ../rust/enclave-protocol
          cargo build --bin enclave-uds-server --bin enclave-stdio-session \
            --features test-support,demo-mock-sign
          cd ../../elixir-shim
          mix test

  build:
    needs: [rust-test, elixir-test]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: impl/nix/vm-hsm
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v3

      - name: Build production enclave
        run: nix build --no-update-lock-file .#enclave --print-out-paths

      - name: Build staging enclave
        run: nix build --no-update-lock-file .#enclave-staging --print-out-paths

      - name: Build NixOS vm runner (Phase B)
        run: nix build --no-update-lock-file .#vm --print-out-paths

      - name: Build production NixOS vm runners
        run: |
          nix build --no-update-lock-file .#vm-production --print-out-paths
          nix build --no-update-lock-file .#vm-production-lab --print-out-paths

      # TASK-1.1: SNP firmware-derived pq-seal root boot helper (Nix package).
      - name: Build snp-derive-root boot helper
        run: nix build --no-update-lock-file .#snp-derive-root --print-out-paths

      # TASK-5 AC#5: validate the SEV-SNP disk image *evaluates* (instantiates the
      # make-disk-image derivation) without building it. The full build needs
      # vmTools.runInLinuxVM (requiredSystemFeatures = ["kvm"]), which GitHub-hosted
      # runners can't be relied on to provide; the real build + SNP boot run on aya.
      - name: Eval SEV-SNP NixOS disk image (AC#5)
        run: |
          nix eval --no-update-lock-file --raw .#packages.x86_64-linux.disk-production-lab.drvPath
          nix eval --no-update-lock-file --raw .#packages.x86_64-linux.disk-production.drvPath
          # TASK-1.1: derived-root self-check image (oneshot runs snp-derive-root --selftest in-guest).
          nix eval --no-update-lock-file --raw .#packages.x86_64-linux.disk-production-lab-selftest.drvPath
          # TASK-1.1 sealed-boot loop: snp-rooted image (enclave unseals against the boot-derived root)
          # + the ceremony print image. Eval only; the end-to-end boot ceremony runs on aya.
          nix eval --no-update-lock-file --raw .#packages.x86_64-linux.disk-production-lab-snp-rooted.drvPath
          nix eval --no-update-lock-file --raw .#packages.x86_64-linux.disk-production-lab-print-ceremony.drvPath

      # TASK-5 AC#10: exercise the mainnet-gate logic (no productionMode=true output ships, so
      # this check is the only place the gate is evaluated; catches labFixtures/override regressions).
      - name: Check mainnet gate (AC#10)
        run: nix build --no-update-lock-file .#checks.x86_64-linux.mainnet-gate --print-out-paths

      - name: Build measurement manifest
        run: |
          nix build --no-update-lock-file .#measurement-manifest --out-link result
          jq . result/manifest.json

      - name: Upload measurement manifest
        uses: actions/upload-artifact@v4
        with:
          name: vm-hsm-measurement-manifest
          path: impl/nix/vm-hsm/result/manifest.json
          if-no-files-found: error