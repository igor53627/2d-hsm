# Repo-specific roborev config for 2d-hsm.
#
# TEE signing / hard-fork service — extreme blast radius. See AGENTS.md for
# Reduced vs Full matrix decision rules.
#
# Post-commit hook: Codex + gpt-5.5. For 3×3 vendor sign-off or 2×3
# concurrency floor, use ~/pse/roborev/pse-review-3x3.sh | pse-review-2x3.sh
# (CLI has no --type concurrency; use design --reasoning maximum instead).

agent = "codex"
model = "gpt-5.5"

# Exclude binary blobs from review prompts (codex UTF-8 failures). Lockfiles stay in scope.
exclude_patterns = [
  "**/*.sealed",
  "**/*.bin",
]

# NOTE: the LOCAL Reduced Matrix is 4 cells — codex/security, gemini/security,
# claude-code/design, and grok/security. The grok cell runs via the NATIVE grok
# CLI (~/pse/roborev/grok-cell.sh), and the gemini cell runs via the Antigravity
# `agy` CLI with NO `--model` (Google deprecated gemini-cli's free tier →
# IneligibleTierError; roborev #730). See AGENTS.md for both. The `[ci]` block
# below is intentionally only the 3 native roborev-DB vendors (codex/gemini/
# claude-code): the grok cell's findings are OUTSIDE the roborev DB (read its
# printed block), so it runs only in the local matrix, not CI. This 3-agent CI
# set is a deliberate scope, not a stale config.

[ci]
# PR CI: three vendors × two lenses (6 cells). Per-agent models are not
# configurable on `roborev ci review` — pin gemini/claude locally via scripts.
agents = ["codex", "gemini", "claude-code"]
review_types = ["security", "design"]

# Soft-degrade applies ONLY to these 3 CI vendors: if one is unavailable, CI
# synthesis runs on responders; re-run manually if a missing cell matters.
# This does NOT license dropping the local grok cell — per AGENTS.md, a grok cell
# that did not reach `done` is a gap, never "compacted clean" (compact silently
# ignores `skipped`/failed jobs).

# High-risk paths — force Full matrix (AGENTS.md) when touched.
high_risk_paths = [
  "impl/",
  "src/",
  "backlog/docs/*vsock*",
  "backlog/docs/*authorization-ticket*",
  "backlog/docs/*hard-fork*",
  "backlog/docs/*agent-gateway*",
  "backlog/docs/*provisioning-runbook*",
]